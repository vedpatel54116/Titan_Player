<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Bundled fontconfig configuration for Titan Player's sandboxed ASS renderer.

  When the app runs inside the App Sandbox, fontconfig cannot read the user's
  fonts, so we point it at this file (via FONTCONFIG_PATH + the config argument
  of ass_set_fonts). Relative <dir> entries resolve against this file's own
  directory, i.e. the bundled Fonts folder that ships Inter-Regular.ttf.
-->
<fontconfig>
  <!-- Bundled fonts ship next to this file. -->
  <dir prefix="relative">.</dir>

  <!-- Fall back to system faces when reachable (non-sandboxed / entitlements). -->
  <dir>/System/Library/Fonts</dir>
  <dir>/Library/Fonts</dir>
  <dir>~/Library/Fonts</dir>

  <!-- Cache in a writable user directory; the bundle itself is read-only at
       runtime (and especially inside the App Sandbox). -->
  <cachedir>~/Library/Caches/com.titanplayer/fontconfig</cachedir>

  <config></config>
</fontconfig>
