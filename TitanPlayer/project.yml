name: TitanPlayer
options:
  bundleIdPrefix: com.titanplayer
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release
  AppStore: release
  Direct: release

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_TESTABILITY: YES
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    PRODUCT_NAME: TitanPlayer
    PRODUCT_BUNDLE_IDENTIFIER: com.titanplayer.app
    INFOPLIST_FILE: TitanPlayer/TitanPlayer/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ENABLE_HARDENED_RUNTIME: YES
    GENERATE_INFOPLIST_FILE: NO
    COMBINE_HIDPI_IMAGES: YES
  configs:
    AppStore:
      CODE_SIGN_IDENTITY: "Apple Distribution"
      CODE_SIGN_ENTITLEMENTS: TitanPlayer/TitanPlayer/TitanPlayer.entitlements
      ENABLE_APP_SANDBOX: YES
    Direct:
      CODE_SIGN_IDENTITY: "Developer ID Application"
      CODE_SIGN_ENTITLEMENTS: TitanPlayer/TitanPlayer/TitanPlayer.Direct.entitlements
      ENABLE_APP_SANDBOX: NO

packages:
  FFmpegBuild:
    path: .build/checkouts/FFmpegBuild
    products:
      - FFmpegBuild
      - Libavcodec
      - Libavformat
      - Libavutil
      - Libswscale

targets:
  TitanPlayer:
    type: application
    platform: macOS
    sources:
      - path: TitanPlayer
        excludes:
          - "Resources/**"
          - "TitanPlayer.entitlements"
          - "TitanPlayer.Direct.entitlements"
          - "Info.plist"
    settings:
      base:
        INFOPLIST_FILE: TitanPlayer/Info.plist
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
    dependencies:
      - package: FFmpegBuild
        product: FFmpegBuild
      - package: FFmpegBuild
        product: Libavcodec
      - package: FFmpegBuild
        product: Libavformat
      - package: FFmpegBuild
        product: Libavutil
      - package: FFmpegBuild
        product: Libswscale
    preBuildScripts:
      - script: |
          set -euo pipefail
          cd "${SRCROOT}/TitanPlayer"
          CONFIG_LOWER=$(echo "${CONFIGURATION}" | tr '[:upper:]' '[:lower:]')
          case "${CONFIG_LOWER}" in
            debug)   swift build -c debug  ;;
            *)       swift build -c release ;;
          esac
          mkdir -p "${BUILT_PRODUCTS_DIR}/${EXECUTABLE_FOLDER_PATH}"
          DEST="${BUILT_PRODUCTS_DIR}/${EXECUTABLE_FOLDER_PATH}/TitanPlayer"
          cp ".build/${CONFIG_LOWER}/TitanPlayer" "${DEST}"
          echo "embedded swiftrm executable at ${DEST}"
      - name: SwiftPM build
    postBuildScripts:
      - script: |
          set -euo pipefail
          SHADER_DIR="${SRCROOT}/TitanPlayer/Resources/Shaders"
          OUTPUT_DIR="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          mkdir -p "${OUTPUT_DIR}"
          mkdir -p "${DERIVED_FILE_DIR}/Metal"
          METAL_FILES=()
          while IFS= read -r -d '' file; do
            METAL_FILES+=("$file")
          done < <(find "${SHADER_DIR}" -name "*.metal" -print0)
          if [ ${#METAL_FILES[@]} -eq 0 ]; then
            echo "warning: No .metal files found in ${SHADER_DIR}"
            exit 0
          fi
          xcrun metal -c "${METAL_FILES[@]}" \
            -I "${SHADER_DIR}" \
            -o "${DERIVED_FILE_DIR}/Metal/default.air"
          xcrun metallib "${DERIVED_FILE_DIR}/Metal/default.air" \
            -o "${OUTPUT_DIR}/default.metallib"
          echo "Compiled Metal shaders → ${OUTPUT_DIR}/default.metallib"
      - name: Compile Metal Shaders
    resources:
      - path: TitanPlayer/Resources/Assets.xcassets
      - path: TitanPlayer/Resources/Shaders
        buildPhase: resources
        optional: true

schemes:
  TitanPlayer:
    build:
      targets:
        TitanPlayer: all
    run:
      config: Debug
    archive:
      config: Direct
