name: TitanPlayer
options:
  bundleIdPrefix: com.titanplayer
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release
  AppStore: release
  Direct: release

settings:
  base:
    SWIFT_VERSION: "5.0"
    ARCHS: ["arm64"]
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_TESTABILITY: YES
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    PRODUCT_NAME: TitanPlayer
    PRODUCT_BUNDLE_IDENTIFIER: com.titanplayer.app
    INFOPLIST_FILE: TitanPlayer/TitanPlayer/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ENABLE_HARDENED_RUNTIME: YES
    GENERATE_INFOPLIST_FILE: NO
    COMBINE_HIDPI_IMAGES: YES
  configs:
    AppStore:
      CODE_SIGN_IDENTITY: "Apple Distribution"
      CODE_SIGN_ENTITLEMENTS: TitanPlayer/TitanPlayer.entitlements
      ENABLE_APP_SANDBOX: YES
    Direct:
      CODE_SIGN_IDENTITY: "Developer ID Application"
      CODE_SIGN_ENTITLEMENTS: TitanPlayer/TitanPlayer.Direct.entitlements
      ENABLE_APP_SANDBOX: NO

packages:
  FFmpegBuild:
    url: https://github.com/superuser404notfound/FFmpegBuild
    from: 1.0.3
    products:
      - FFmpegBuild
      - Libavcodec
      - Libavformat
      - Libavutil
      - Libswscale
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.0.0

targets:
  TitanPlayer:
    type: application
    platform: macOS
    sources:
      - path: TitanPlayer
        excludes:
          - "Resources/**"
          - "TitanPlayer.entitlements"
          - "TitanPlayer.Direct.entitlements"
          - "Info.plist"
    settings:
      base:
        INFOPLIST_FILE: TitanPlayer/TitanPlayer/Info.plist
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - /opt/homebrew/include
        SWIFT_INCLUDE_PATHS:
          - "$(SRCROOT)/TitanPlayer/Sources/CLibAss"
          - /opt/homebrew/include
        LIBRARY_SEARCH_PATHS:
          - "$(inherited)"
          - /opt/homebrew/lib
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-lass"
    dependencies:
      - package: FFmpegBuild
        product: FFmpegBuild
      - package: FFmpegBuild
        product: Libavcodec
      - package: FFmpegBuild
        product: Libavformat
      - package: FFmpegBuild
        product: Libavutil
      - package: FFmpegBuild
        product: Libswscale
      - package: Sentry
        product: Sentry
    postBuildScripts:
      - script: |
          set -euo pipefail
          SHADER_DIR="${SRCROOT}/TitanPlayer/TitanPlayer/Resources/Shaders"
          OUTPUT_DIR="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          METAL_DIR="${DERIVED_FILE_DIR}/Metal"
          mkdir -p "${OUTPUT_DIR}"
          mkdir -p "${METAL_DIR}"
          count=0
          for file in "${SHADER_DIR}"/*.metal; do
            if [ -f "$file" ]; then
              base=$(basename "$file" .metal)
              xcrun metal -c "$file" -I "${SHADER_DIR}" -o "${METAL_DIR}/${base}.air"
              count=$((count + 1))
            fi
          done
          if [ "$count" -eq 0 ]; then
            echo "warning: No .metal files found in ${SHADER_DIR}"
            exit 0
          fi
          cd "${METAL_DIR}"
          xcrun metallib *.air -o "${OUTPUT_DIR}/default.metallib"
          echo "Compiled Metal shaders → ${OUTPUT_DIR}/default.metallib"
      - name: Compile Metal Shaders
        inputFiles:
          - "$(SRCROOT)/TitanPlayer/TitanPlayer/Resources/Shaders/*.metal"
        outputFiles:
          - "$(DERIVED_FILE_DIR)/Metal/default.air"
          - "$(DERIVED_FILE_DIR)/Metal/common.metallib"
    resources:
      - path: TitanPlayer/TitanPlayer/Resources/Assets.xcassets
      - path: TitanPlayer/TitanPlayer/Resources/Shaders
        buildPhase: resources
        optional: true

schemes:
  TitanPlayer:
    build:
      targets:
        TitanPlayer: all
    run:
      config: Debug
    archive:
      config: Direct
