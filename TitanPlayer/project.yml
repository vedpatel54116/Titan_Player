name: TitanPlayer
options:
  bundleIdPrefix: com.titanplayer
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release
  AppStore: release
  Direct: release

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_TESTABILITY: YES
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    PRODUCT_NAME: TitanPlayer
    PRODUCT_BUNDLE_IDENTIFIER: com.titanplayer.app
    INFOPLIST_FILE: TitanPlayer/TitanPlayer/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ENABLE_HARDENED_RUNTIME: YES
    GENERATE_INFOPLIST_FILE: NO
    COMBINE_HIDPI_IMAGES: YES
  configs:
    AppStore:
      CODE_SIGN_IDENTITY: "Apple Distribution"
      CODE_SIGN_ENTITLEMENTS: TitanPlayer/TitanPlayer/TitanPlayer.entitlements
      ENABLE_APP_SANDBOX: YES
    Direct:
      CODE_SIGN_IDENTITY: "Developer ID Application"
      CODE_SIGN_ENTITLEMENTS: TitanPlayer/TitanPlayer/TitanPlayer.Direct.entitlements
      ENABLE_APP_SANDBOX: NO

targets:
  TitanPlayer:
    type: application
    platform: macOS
    sources:
      - path: TitanPlayer
        excludes:
          - "Resources/**"
          - "TitanPlayer.entitlements"
          - "TitanPlayer.Direct.entitlements"
          - "Info.plist"
    settings:
      base:
        INFOPLIST_FILE: TitanPlayer/Info.plist
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
    preBuildScripts:
      - script: |
          set -euo pipefail
          cd "${SRCROOT}/TitanPlayer"
          CONFIG_LOWER=$(echo "${CONFIGURATION}" | tr '[:upper:]' '[:lower:]')
          case "${CONFIG_LOWER}" in
            debug)   swift build -c debug  ;;
            *)       swift build -c release ;;
          esac
          mkdir -p "${BUILT_PRODUCTS_DIR}/${EXECUTABLE_FOLDER_PATH}"
          DEST="${BUILT_PRODUCTS_DIR}/${EXECUTABLE_FOLDER_PATH}/TitanPlayer"
          cp ".build/${CONFIG_LOWER}/TitanPlayer" "${DEST}"
          echo "embedded swiftrm executable at ${DEST}"
      - name: SwiftPM build

schemes:
  TitanPlayer:
    build:
      targets:
        TitanPlayer: all
    run:
      config: Debug
    archive:
      config: Direct
